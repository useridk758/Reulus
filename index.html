<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reulus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ui-wrapper" id="main-ui">
        <div class="clock-section">
            <h1 id="clock">00:00</h1>
            <p id="date">LOADING...</p>
        </div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search or enter URL..." autofocus>
        </div>

        <div class="apps">
            <div class="app-card" onclick="launch('https://www.google.com')">
                <img src="https://cdn.simpleicons.org/google/white" alt="">
                <span>Google</span>
            </div>
            <div class="app-card" onclick="launch('https://www.tiktok.com')">
                <img src="https://cdn.simpleicons.org/tiktok/white" alt="">
                <span>TikTok</span>
            </div>
            <div class="app-card" onclick="launch('https://www.roblox.com')">
                <img src="https://cdn.simpleicons.org/roblox/white" alt="">
                <span>Roblox</span>
            </div>
            <div class="app-card" onclick="launch('https://www.twitch.tv')">
                <img src="https://cdn.simpleicons.org/twitch/white" alt="">
                <span>Twitch</span>
            </div>
        </div>
    </div>

    <div id="view-container" class="hidden">
        <div class="nav-controls">
            <button onclick="closeView()" class="close-btn">ESC</button>
            <span id="current-url"></span>
            <div style="width: 50px;"></div> </div>
        <iframe id="browser-frame" src=""></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
