<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reulus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="bg-layer" class="wallpaper-container"></div>
    
    <div class="ui-wrapper" id="main-ui">
        <div class="clock-section">
            <h1 id="clock">00:00</h1>
            <p id="date">APRIL 1, 2026</p>
        </div>

        <div class="search-bar">
            <i data-lucide="search" class="search-icon-svg"></i>
            <input type="text" id="search-input" placeholder="Search with Bing...">
        </div>

        <div class="shortcut-grid">
            <div class="shortcut-card" onclick="launch('https://www.bing.com', 'Bing')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/bing/008373"></div>
                <span>Bing</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://en.m.wikipedia.org', 'Wikipedia')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/wikipedia/white"></div>
                <span>Wikipedia</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://m.twitch.tv', 'Twitch')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/twitch/white"></div>
                <span>Twitch</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://www.tiktok.com', 'TikTok')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/tiktok/white"></div>
                <span>TikTok</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://www.roblox.com', 'Roblox')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/roblox/white"></div>
                <span>Roblox</span>
            </div>
        </div>

        <nav class="dock-container">
            <div class="dock">
                <div class="dock-item" onclick="launch('https://discord.com/app', 'Discord')"><i data-lucide="message-square"></i></div>
                <div class="dock-item" onclick="launch('https://vexo.tv', 'Movies')"><i data-lucide="film"></i></div>
                <div class="divider"></div>
                <div class="dock-item" onclick="launch('https://freezenova.ai/chat/', 'Chatbot')"><i data-lucide="bot"></i></div>
                <div class="dock-item" onclick="launch('https://monochrome.tf', 'Music')"><i data-lucide="music"></i></div>
                <div class="dock-item prank-btn" onclick="aprilFools()"><i data-lucide="party-popper"></i></div>
                <div class="dock-item heart-red"><i data-lucide="heart"></i></div>
            </div>
        </nav>
    </div>

    <div id="view-container" class="hidden">
        <div class="nav-controls">
            <div class="nav-left">
                <button onclick="closeView()" class="nav-btn"><i data-lucide="home"></i></button>
                <button onclick="reloadFrame()" class="nav-btn"><i data-lucide="rotate-cw"></i></button>
            </div>
            <span id="current-url-display" class="centered-title">REULUS BROWSER</span>
        </div>
        <div class="frame-container">
            <iframe id="browser-frame" src="about:blank"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
