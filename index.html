<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reulus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>
    <main class="content">
        <div id="clock">00:00 PM</div>
        <div id="date">SATURDAY, MARCH 28</div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="url-input" placeholder="Search the web or enter URL...">
        </div>

        <div class="app-grid">
            <div class="app-item" onclick="launch('https://duckduckgo.com')">
                <div class="icon-wrapper ddg"></div>
                <span>DuckDuckGo</span>
            </div>
            <div class="app-item" onclick="launch('https://wikipedia.org')">
                <div class="icon-wrapper wiki"></div>
                <span>Wikipedia</span>
            </div>
            <div class="app-item" onclick="launch('https://tiktok.com')">
                <div class="icon-wrapper tiktok"></div>
                <span>TikTok</span>
            </div>
            <div class="app-item" onclick="launch('https://soundcloud.com')">
                <div class="icon-wrapper music"></div>
                <span>Music</span>
            </div>
            <div class="app-item" onclick="launch('https://twitch.tv')">
                <div class="icon-wrapper gaming"></div>
                <span>Gaming</span>
            </div>
            <div class="app-item" onclick="launch('https://roblox.com')">
                <div class="icon-wrapper roblox"></div>
                <span>Roblox</span>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
