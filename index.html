<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reulus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="bg-layer" class="wallpaper-container"></div>
    
    <div class="ui-wrapper" id="main-ui">
        <div class="clock-section">
            <h1 id="clock">00:00</h1>
            <p id="date">JANUARY 1, 2026</p>
        </div>

        <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="search-input" placeholder="Search the web...">
        </div>

        <div class="shortcut-grid">
            <div class="shortcut-card" onclick="launch('https://www.google.com/search?igu=1', 'Google')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/google/white"></div>
                <span>Google</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://en.m.wikipedia.org', 'Wikipedia')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/wikipedia/white"></div>
                <span>Wikipedia</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://www.bing.com', 'Bing')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/bing/white"></div>
                <span>Bing</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://vexo.tv', 'Movies')">
                <div class="icon-box-square"><i data-lucide="play-circle"></i></div>
                <span>Movies</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://m.twitch.tv', 'Twitch')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/twitch/white"></div>
                <span>Gaming</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://www.roblox.com/home', 'Roblox')">
                <div class="icon-box-square"><img src="https://cdn.simpleicons.org/roblox/white"></div>
                <span>Roblox</span>
            </div>
        </div>

        <nav class="dock-container">
            <div class="dock">
                <div class="dock-item" onclick="openChat()"><i data-lucide="message-square"></i></div>
                <div class="dock-item" onclick="launch('https://vexo.tv', 'Movies')"><i data-lucide="film"></i></div>
                <div class="dock-item" onclick="openWebSection()"><i data-lucide="globe"></i></div>
                <div class="divider"></div>
                <div class="dock-item" onclick="openSettings()"><i data-lucide="settings"></i></div>
                <div class="dock-item" onclick="launch('https://freezenova.ai/chat/', 'Chatbot')"><i data-lucide="bot"></i></div>
                <div class="dock-item" onclick="launch('https://monochrome.tf', 'Music')"><i data-lucide="music"></i></div>
                <div class="dock-item heart"><i data-lucide="heart"></i></div>
            </div>
        </nav>
    </div>

    <div id="view-container" class="hidden">
        <div class="nav-controls">
            <div class="nav-left">
                <button onclick="closeView()" class="nav-btn"><i data-lucide="home"></i></button>
                <button onclick="reloadFrame()" class="nav-btn"><i data-lucide="rotate-cw"></i></button>
            </div>
            <span id="current-url-display" class="centered-title">REULUS BROWSER</span>
            <div class="nav-right"></div>
        </div>

        <div id="chat-maintenance" class="view-content hidden">
            <div class="maintenance-box">
                <i data-lucide="wrench" size="64" color="#ffcc00"></i>
                <h2>Chatroom</h2>
                <p>Under Maintenance</p>
            </div>
        </div>

        <div id="web-section-landing" class="view-content hidden">
            <div class="web-intro">
                <i data-lucide="globe" size="48"></i>
                <h2>Reulus Web</h2>
                <input type="text" id="web-section-search" placeholder="Enter URL or Search Query...">
            </div>
        </div>

        <iframe id="browser-frame" src="about:blank"></iframe>
    </div>

    <div id="settings-view" class="hidden overlay-view">
        <div class="settings-modal">
            <div class="settings-header">
                <h3>Settings</h3>
                <button onclick="closeSettings()" class="close-x">&times;</button>
            </div>
            <div class="settings-list">
                <div class="setting-row">
                    <span>Wallpaper</span>
                    <input type="file" id="wallpaper-input" hidden accept="image/*">
                    <button class="set-btn" onclick="document.getElementById('wallpaper-input').click()">Upload Image</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
