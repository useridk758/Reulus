<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reulus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="wallpaper-container"></div>
    
    <div class="ui-wrapper" id="main-ui">
        <div class="clock-section">
            <h1 id="clock">00:00</h1>
            <p id="date">LOADING...</p>
        </div>

        <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="search-input" placeholder="Search the web or enter URL..." autofocus>
        </div>

        <div class="shortcut-grid">
            <div class="shortcut-card" onclick="launch('https://duckduckgo.com', 'DuckDuckGo')">
                <div class="icon-box orange"><img src="https://cdn.simpleicons.org/duckduckgo/white" alt=""></div>
                <span>DuckDuckGo</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://wikipedia.org', 'Wikipedia')">
                <div class="icon-box grey"><img src="https://cdn.simpleicons.org/wikipedia/white" alt=""></div>
                <span>Wikipedia</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://tiktok.com', 'TikTok')">
                <div class="icon-box black"><img src="https://cdn.simpleicons.org/tiktok/white" alt=""></div>
                <span>TikTok</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://vexo.tv', 'Movies')">
                <div class="icon-box orange-red"><i data-lucide="play-circle"></i></div>
                <span>Movies</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://twitch.tv', 'Gaming')">
                <div class="icon-box purple"><img src="https://cdn.simpleicons.org/twitch/white" alt=""></div>
                <span>Gaming</span>
            </div>
            <div class="shortcut-card" onclick="launch('https://roblox.com', 'Roblox')">
                <div class="icon-box dark-grey"><img src="https://cdn.simpleicons.org/roblox/white" alt=""></div>
                <span>Roblox</span>
            </div>
        </div>

        <nav class="dock-container">
            <div class="dock">
                <div class="dock-item" onclick="openDiscordModal()"><i data-lucide="message-square"></i></div>
                <div class="dock-item" onclick="launch('https://vexo.tv', 'Movies')"><i data-lucide="film"></i></div>
                <div class="dock-item" onclick="openWebSection()"><i data-lucide="globe"></i></div>
                <div class="dock-item" onclick="openSettings()"><i data-lucide="settings"></i></div>
                <div class="divider"></div>
                <div class="dock-item" onclick="launch('https://freezenova.ai/chat/', 'Chatbot')"><i data-lucide="bot"></i></div>
                <div class="dock-item" onclick="launch('https://monochrome.tf', 'Music')"><i data-lucide="music"></i></div>
                <div class="dock-item heart"><i data-lucide="heart"></i></div>
            </div>
        </nav>
    </div>

    <div id="view-container" class="hidden">
        <div class="nav-controls">
            <div class="nav-left">
                <button onclick="closeView()" class="nav-btn"><i data-lucide="home"></i></button>
                <button onclick="reloadFrame()" class="nav-btn"><i data-lucide="rotate-cw"></i></button>
            </div>
            <span id="current-url-display">Reulus Web</span>
            <div class="nav-right"></div>
        </div>
        <iframe id="browser-frame" src=""></iframe>
    </div>

    <div id="discord-modal" class="hidden overlay-view">
        <div class="modal-box">
            <i data-lucide="message-square" style="color: #5865F2; margin-bottom: 15px;"></i>
            <h3>Join the Community</h3>
            <p>The discord link for Reulus is:</p>
            <div class="link-display">https://discord.gg/R2KEzG5kN</div>
            <button class="close-overlay" onclick="closeDiscordModal()">Close</button>
        </div>
    </div>

    <div id="settings-view" class="hidden overlay-view">
        <div class="modal-box">
            <h2>Settings</h2>
            <p>UI Customization & Proxy Config</p>
            <button class="close-overlay" onclick="closeSettings()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
