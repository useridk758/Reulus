<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Layout with Photo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">BRAND</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Gallery</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="hero">
            <div class="image-wrapper">
                <img src="your-first-photo.jpg" alt="First Ever Photo" class="main-photo">
            </div>
            <h1>Layout Restored</h1>
            <p>The photo is now integrated correctly.</p>
            <button id="action-btn">Refresh View</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
